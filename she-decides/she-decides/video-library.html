    <p class="hdr-desc">TED演讲、成功女性访谈、她说了算原创——每条视频都附上选片理由，帮你在看之前就知道为什么值得看。全部通过B站播放，无需VPN。</p>
    <div class="curator-row">
      <div class="chip"><div class="chip-av av-r">J</div><div><div class="chip-name">Janet 精选</div><div class="chip-role">30年教练视角</div></div></div>
      <div class="chip"><div class="chip-av av-t">Y</div><div><div class="chip-name">Yilin 精选</div><div class="chip-role">国际视角 · 叙事力</div></div></div>
      <div class="chip"><div class="chip-av av-e">✦</div><div><div class="chip-name">编辑部推荐</div><div class="chip-role">全球内容策展</div></div></div>
    </div>
  </div>
</header>

<!-- FILTER -->
<div class="filter-wrap">
  <div class="filter-in">
    <div class="filter-row">
      <span class="flabel">主题</span>
      <button class="ftab on" data-dim="pillar" data-val="all" onclick="doFilter(this)">全部</button>
      <button class="ftab" data-dim="pillar" data-val="cog" onclick="doFilter(this)">🧠 认知套利</button>
      <button class="ftab" data-dim="pillar" data-val="id"  onclick="doFilter(this)">🔄 身份重塑</button>
      <button class="ftab" data-dim="pillar" data-val="en"  onclick="doFilter(this)">⚡ 精力主权</button>
      <div class="fdiv"></div>
      <span class="flabel">策展人</span>
      <button class="ftab" data-dim="curator" data-val="all" onclick="doFilter(this)">全部</button>
      <button class="ftab" data-dim="curator" data-val="j"   onclick="doFilter(this)">Janet</button>
      <button class="ftab" data-dim="curator" data-val="y"   onclick="doFilter(this)">Yilin</button>
      <button class="ftab" data-dim="curator" data-val="e"   onclick="doFilter(this)">编辑部</button>
      <span class="fcount" id="fcount"></span>
    </div>
  </div>
</div>

<main class="page">
  <!-- FEATURED (rendered by JS) -->
  <div id="featured-wrap" class="feat-wrap reveal"></div>

  <!-- GRID -->
  <div class="grid-hdr reveal">
    <div class="grid-t">全部视频</div>
    <div class="grid-c" id="grid-count"></div>
  </div>
  <div class="vgrid reveal" id="vgrid"></div>
</main>

<!-- MODAL -->
<div class="modal-ov" id="modalOv" onclick="handleMO(event)">
  <div class="modal-box">
    <div class="modal-bar">
      <span class="modal-bili-link">B站播放 · 她说了算账户</span>
      <button class="modal-close" onclick="closeModal()">× 关闭 (ESC)</button>
    </div>
    <div class="modal-player">
      <div class="mplaceholder" id="mPH" onclick="loadModal(this)">
        <div class="mplay"><svg viewBox="0 0 10 10"><path d="M2 1L9 5L2 9Z"/></svg></div>
        <div class="mp-title" id="mPHTitle"></div>
        <div class="mp-sub">点击加载 · B站播放</div>
      </div>
    </div>
    <div class="modal-info">
      <div style="flex:1;">
        <div class="mi-title" id="mTitle"></div>
        <div class="mi-meta" id="mMeta"></div>
        <div class="mi-note">
          <div class="mi-cav" id="mCAv"></div>
          <div class="mi-ctext" id="mCText"></div>
        </div>
        <div class="mi-issue" id="mIssue"></div>
      </div>
      <a class="modal-bili-btn" id="mBiliLink" href="#" target="_blank">
        在B站打开 →
      </a>
    </div>
  </div>
</div>

<script>
/* ── Config ── */
const CURATOR = {
  j: { label:'Janet', color:'#c4587a' },
  y: { label:'Yilin', color:'#1d4a35' },
  e: { label:'✦',     color:'#c49a3c' }
};
const PILLAR_CFG = {
  cog: { label:'认知套利', cls:'vp-cog' },
  id:  { label:'身份重塑', cls:'vp-id' },
  en:  { label:'精力主权', cls:'vp-en' }
};

/* ── Render featured ── */
function renderFeatured() {
  const v = VIDEOS.find(v => v.featured);
  if(!v) return;
  const c = CURATOR[v.curator];
  document.getElementById('featured-wrap').innerHTML = `
    <div class="sec-ey">本期精选</div>
    <div class="sec-t" style="margin-bottom:16px;">${c.label} 推荐这条</div>
    <div class="feat-card">
      <div class="fl">
        <div>
          <div class="ftitle">${v.title}</div>
          <div class="fperson">${v.person}</div>
          <div class="fcnote">
            <div class="fcnote-av" style="background:${c.color}">${c.label === 'Janet' ? 'J' : c.label === 'Yilin' ? 'Y' : '✦'}</div>
            <div class="fcnote-text">「${v.note}」</div>
          </div>
          <div class="ftags"><span class="vtag">${PILLAR_CFG[v.pillar].label}</span><span class="vtag">${v.type}</span></div>
          <div class="fmeta">${v.dur} · ${v.issue}</div>
        </div>
        <button class="btn-watch" onclick="openModal(VIDEOS.find(x=>x.featured))">
          <svg width="13" height="13" viewBox="0 0 10 10" fill="currentColor"><path d="M2 1L9 5L2 9Z"/></svg>
          立即播放
        </button>
      </div>
      <div class="fr" onclick="openModal(VIDEOS.find(x=>x.featured))">
        <div class="pcirc"><svg viewBox="0 0 10 10"><path d="M2 1L9 5L2 9Z"/></svg></div>
        <div class="fr-hint">点击播放</div>
        <div class="fdur">${v.dur}</div>
      </div>
    </div>`;
}

/* ── Render grid ── */
function renderGrid(filter) {
  const grid = document.getElementById('vgrid');
  const list = VIDEOS.filter(v => !v.featured &&
    (filter.pillar === 'all' || v.pillar === filter.pillar) &&
    (filter.curator === 'all' || v.curator === filter.curator)
  );
  document.getElementById('fcount').textContent = `共 ${list.length} 条`;
  document.getElementById('grid-count').textContent = `共 ${list.length} 条 · 持续更新`;
  grid.innerHTML = list.map(v => {
    const c = CURATOR[v.curator];
    const p = PILLAR_CFG[v.pillar];
    const av = v.curator === 'j' ? 'J' : v.curator === 'y' ? 'Y' : '✦';
    return `
    <div class="vcard" onclick="openModal(VIDEOS.find(x=>x.bvid==='${v.bvid}'&&x.title==='${v.title.replace(/'/g,"\\'")}'))">
      <div class="vth tb-${v.color||1}">
        <div class="vplay"><svg viewBox="0 0 10 10"><path d="M2 1L9 5L2 9Z"/></svg></div>
        <div class="vth-txt">${v.title}</div>
        <div class="vdur">${v.dur}</div>
      </div>
      <div class="vbody">
        <div class="vtop">
          <span class="vpillar ${p.cls}">${p.label}</span>
          <span class="vtype">${v.type}</span>
        </div>
        <div class="vtitle">${v.title}</div>
        <div class="vperson">${v.person}</div>
        <div class="vnote">
          <div class="vnote-av" style="background:${c.color}">${av}</div>
          <div class="vnote-text">「${v.note}」</div>
        </div>
        <div class="vfoot">
          <span class="vmeta">B站 · ${v.type}</span>
          <span class="vissue">${v.issue}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── Filter ── */
let state = { pillar:'all', curator:'all' };
function doFilter(tab) {
  const dim = tab.dataset.dim, val = tab.dataset.val;
  state[dim] = val;
  document.querySelectorAll(`[data-dim="${dim}"]`).forEach(t => t.classList.remove('on'));
  tab.classList.add('on');
  renderGrid(state);
}

/* ── Modal ── */
let curV = null;
function openModal(v) {
  if(!v) return;
  curV = v;
  const c = CURATOR[v.curator];
  const av = v.curator === 'j' ? 'J' : v.curator === 'y' ? 'Y' : '✦';
  const who = v.curator === 'j' ? 'Janet 说：' : v.curator === 'y' ? 'Yilin 说：' : '编辑推荐：';
  document.getElementById('mTitle').textContent = v.title;
  document.getElementById('mMeta').textContent = v.person + (v.dur ? ' · ' + v.dur : '');
  document.getElementById('mPHTitle').textContent = v.title;
  const cav = document.getElementById('mCAv');
  cav.textContent = av;
  cav.style.background = c.color;
  document.getElementById('mCText').innerHTML = `<em style="color:rgba(255,255,255,.45);font-size:10px;font-style:normal;">${who}</em><br>${v.note}`;
  document.getElementById('mIssue').textContent = v.issue || '';
  document.getElementById('mBiliLink').href = `https://www.bilibili.com/video/${v.bvid}`;
  const ph = document.getElementById('mPH');
  ph.style.display = 'flex';
  document.querySelector('.modal-player iframe')?.remove();
  document.getElementById('modalOv').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function loadModal(ph) {
  if(!curV) return;
  const iframe = document.createElement('iframe');
  iframe.src = `//player.bilibili.com/player.html?bvid=${curV.bvid}&autoplay=1&high_quality=1&danmaku=0`;
  iframe.allowFullscreen = true;
  iframe.style.cssText = 'width:100%;height:100%;border:none;display:block;';
  ph.style.display = 'none';
  ph.closest('.modal-player').appendChild(iframe);
}

function closeModal() {
  document.getElementById('modalOv').classList.remove('show');
  document.body.style.overflow = '';
  document.querySelector('.modal-player iframe')?.remove();
  document.getElementById('mPH').style.display = 'flex';
}

function handleMO(e) { if(e.target===document.getElementById('modalOv')) closeModal(); }

/* ── Init ── */
document.addEventListener('DOMContentLoaded', () => {
  renderFeatured();
  renderGrid(state);
  document.getElementById('fcount').textContent = `共 ${VIDEOS.filter(v=>!v.featured).length} 条`;
  window.addEventListener('scroll', () => {
    document.getElementById('pb').style.width = (window.scrollY/(document.documentElement.scrollHeight-window.innerHeight)*100)+'%';
  });
  const obs = new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible');});},{threshold:.06});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
});
</script>
</body>
</html>
