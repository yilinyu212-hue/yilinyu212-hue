.reveal.visible{opacity:1;transform:translateY(0);}

  .orig-feat{grid-template-columns:1fr;}.of-right{min-height:140px;}
  .vgrid{grid-template-columns:1fr 1fr;}
  .modal-info{flex-direction:column;}
}
@media(max-width:480px){.vgrid{grid-template-columns:1fr;}}

/* ── Config ─────────────────────────────────────────────────── */
const SRC_CFG = {

};
const PILLAR = {cog:'认知套利',id:'身份重塑',en:'精力主权'};

const CURATOR_COLOR = {j:'var(--rose)',y:'var(--teal)',e:'var(--gold)'};
const CURATOR_LABEL = {j:'Janet',y:'Yilin',e:'✦'};

        <div class="mplay"><svg viewBox="0 0 10 10"><path d="M2 1L9 5L2 9Z"/></svg></div>

      </a>
    </div>
  </div>
</div>

<script>
/* ── Render helpers ─────────────────────────────────────────── */
function thumbBg(n){ return 'tb'+(n||1); }

function cardHTML(v, showSrc=false) {
  const p  = PILLAR[v.pillar]||'';
  const pc = PILLAR_CLS[v.pillar]||'vp-cog';
  const cc = CURATOR_COLOR[v.curator]||'var(--rose)';
  const cl = CURATOR_LABEL[v.curator]||'';
  const srcBadge = showSrc && v.src ? `<span class="vsrc src-${v.src}">${SRC_CFG[v.src]?.label||''}</span>` : '';
  const vpnBadge = v.vpn ? `<span class="vpn-badge">需VPN</span>` : '';
  return `
  <div class="vcard" onclick='openModal(${JSON.stringify(v)})'>
    <div class="vth ${thumbBg(v.color)}">
      ${srcBadge}${vpnBadge}
      <div class="vplay"><svg viewBox="0 0 10 10"><path d="M2 1L9 5L2 9Z"/></svg></div>
      <div class="vth-txt">${v.title}</div>
      <div class="vdur">${v.dur||''}</div>
    </div>
    <div class="vbody">
      <div class="vtop">
        ${p ? `<span class="vpillar ${pc}">${p}</span>` : '<span></span>'}
        <span class="vtype">${v.type||''}</span>
      </div>
      <div class="vtitle">${v.title}</div>
      <div class="vperson">${v.person}</div>
      ${v.note ? `<div class="vnote"><div class="vnote-av" style="background:${cc}">${cl}</div><div class="vnote-text">「${v.note}」</div></div>` : ''}
      <div class="vfoot">
        <span class="vmeta">${showSrc ? (SRC_CFG[v.src||'orig']?.label||'B站')+' · '+(v.vpn?'需VPN':'免VPN') : 'B站 · 免VPN'}</span>
        <span class="vissue">${v.issue||''}</span>
      </div>
    </div>
  </div>`;
}

function featHTML(v, showSrc=false) {
  const cc = CURATOR_COLOR[v.curator]||'var(--rose)';
  const cl = CURATOR_LABEL[v.curator]||'';
  const srcLabel = showSrc ? SRC_CFG[v.src||'orig']?.label||'B站' : 'B站原创';
  return `
  <div class="orig-feat">
    <div class="of-left">
      <div>
        <div class="of-badge">✦ ${showSrc?'本周策展精选':'本期精选'}</div>
        <div class="of-title">${v.title}</div>
        <div class="of-desc">${v.desc||''}</div>
        ${v.tags ? `<div class="of-tags">${v.tags.map(t=>`<span class="of-tag">${t}</span>`).join('')}</div>` : ''}
        <div class="of-meta">${v.dur||''} · ${srcLabel} · ${v.issue||''}</div>
        ${v.note ? `<div style="display:flex;align-items:flex-start;gap:9px;padding:10px 14px;background:rgba(255,255,255,.06);border-left:3px solid var(--rose);border-radius:0 5px 5px 0;margin-top:12px;"><div style="width:20px;height:20px;border-radius:50%;background:${cc};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;">${cl}</div><div style="font-size:13px;color:rgba(255,255,255,.68);line-height:1.65;font-style:italic;">「${v.note}」</div></div>` : ''}
      </div>
      <button class="btn-play" onclick='openModal(${JSON.stringify(v)})'>
        <svg width="13" height="13" viewBox="0 0 10 10" fill="currentColor"><path d="M2 1L9 5L2 9Z"/></svg>
        立即播放
      </button>
    </div>
    <div class="of-right" onclick='openModal(${JSON.stringify(v)})'>
      <div class="pcirc"><svg viewBox="0 0 10 10"><path d="M2 1L9 5L2 9Z"/></svg></div>
      <div class="fdur">${v.dur||''}</div>
    </div>
  </div>`;
}

/* ── Init ───────────────────────────────────────────────────── */
function init() {
  // ORIGINALS
  const feat_o = ORIGINALS.find(v=>v.featured);
  if(feat_o) document.getElementById('orig-feat-wrap').innerHTML = featHTML(feat_o,false);
  const explains = ORIGINALS.filter(v=>!v.featured && v.series==='explain');
  const tools    = ORIGINALS.filter(v=>!v.featured && v.series==='tool');
  document.getElementById('orig-explain-grid').innerHTML = explains.map(v=>cardHTML(v,false)).join('');
  document.getElementById('orig-tool-grid').innerHTML    = tools.map(v=>cardHTML(v,false)).join('');
  document.getElementById('orig-count').textContent = ORIGINALS.length+'条';

  // CURATED
  const feat_c = CURATED.find(v=>v.featured);
  if(feat_c) document.getElementById('cur-feat-wrap').innerHTML = featHTML(feat_c,true);
  renderCurated('all');
  document.getElementById('cur-count').textContent = CURATED.length+'条';
}

/* ── Filter (curated) ───────────────────────────────────────── */
let curFilter = 'all';
function doFilter(tab) {
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  tab.classList.add('on');
  curFilter = tab.dataset.f;
  renderCurated(curFilter);
}
function renderCurated(f) {
  const list = CURATED.filter(v=>!v.featured).filter(v=>{
    if(f==='all') return true;
    if(['cog','id','en'].includes(f)) return v.pillar===f;
    return v.src===f;
  });
  document.getElementById('cur-grid').innerHTML = list.map(v=>cardHTML(v,true)).join('');
}

/* ── Tab switch ─────────────────────────────────────────────── */
function switchTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('section-'+id).classList.add('active');
}

/* ── Modal ──────────────────────────────────────────────────── */
let curV = null;
function openModal(v) {
  curV = v;
  const src = v.src||'orig';
  const cfg = SRC_CFG[src]||SRC_CFG.orig;
  const sb = document.getElementById('mSrc');
  sb.textContent = cfg.label;
  sb.className = 'modal-src '+cfg.cls;
  document.getElementById('mTitle').textContent = v.title;
  document.getElementById('mMeta').textContent  = v.person+(v.dur?' · '+v.dur:'');
  document.getElementById('mPHTitle').textContent = v.title;
  document.getElementById('mPHNote').textContent  = cfg.note;
  const cav = document.getElementById('mCAv');
  cav.textContent = CURATOR_LABEL[v.curator]||'✦';
  cav.style.background = CURATOR_COLOR[v.curator]||'var(--gold)';
  const who = v.curator==='j'?'Janet 说：':v.curator==='y'?'Yilin 说：':'编辑推荐：';
  document.getElementById('mCText').innerHTML = `<em style="color:rgba(255,255,255,.4);font-size:10px;font-style:normal;">${who}</em><br>${v.note||''}`;
  document.getElementById('mIssue').textContent = v.issue||'';
  document.getElementById('mExt').href = v.url||'#';
  const ph = document.getElementById('mPH');
  ph.style.display = 'flex';
  document.querySelector('.modal-player iframe')?.remove();
  document.getElementById('modalOv').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function loadModal(ph) {
  if(!curV) return;
  const src = curV.src||'orig';
  if(['ted','yt','wx'].includes(src)) {
    window.open(curV.url||'#','_blank');
    closeModal(); return;
  }
  const iframe = document.createElement('iframe');
  iframe.src = `//player.bilibili.com/player.html?bvid=${curV.bvid}&autoplay=1&high_quality=1&danmaku=0`;
  iframe.allowFullscreen = true;
  iframe.style.cssText = 'width:100%;height:100%;border:none;display:block;';
  ph.style.display = 'none';
  ph.closest('.modal-player').appendChild(iframe);
}

function closeModal() {
  document.getElementById('modalOv').classList.remove('show');
  document.body.style.overflow = '';
  document.querySelector('.modal-player iframe')?.remove();
  document.getElementById('mPH').style.display = 'flex';
}
function handleMO(e){if(e.target===document.getElementById('modalOv'))closeModal();}

/* ── Misc ───────────────────────────────────────────────────── */
window.addEventListener('scroll',()=>{
  document.getElementById('pb').style.width=(window.scrollY/(document.documentElement.scrollHeight-window.innerHeight)*100)+'%';
});
const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible');});},{threshold:.06});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

document.addEventListener('DOMContentLoaded', init);
</script>
